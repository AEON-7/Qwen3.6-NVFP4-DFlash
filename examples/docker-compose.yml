# Qwen3.6-35B-A3B heretic NVFP4 + DFlash spec decode on DGX Spark
#
# Image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1
#   - vLLM HEAD source-built for cu130/sm_120 (DGX Spark / GB10 / sm_121a)
#   - flashinfer 0.6.8 (sm_120 NVFP4 KV decode kernels)
#   - DFlash proposer baked in
#   - 7 patches (registry, RTLD_LAZY, mamba block_size, M-RoPE)
#
# Target: AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4 (~21 GB)
# Drafter: z-lab/Qwen3.6-35B-A3B-DFlash (~905 MB, gated — request access on HF)
#
# Expected: 91 tok/s single-stream greedy, 729 tok/s @64 concurrency (measured)
#
# ─── PATHS ─────────────────────────────────────────────────────────────────
# This compose expects the standard layout from docs/dgx-spark-setup.md:
#   /opt/qwen36/qwen36-nvfp4/    ← AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4
#   /opt/qwen36/qwen36-dflash/   ← z-lab/Qwen3.6-35B-A3B-DFlash
# Override with QWEN36_MODELS_DIR env var if your layout differs:
#   QWEN36_MODELS_DIR=/my/path docker compose up -d
# ───────────────────────────────────────────────────────────────────────────

services:
  vllm:
    image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1
    container_name: vllm-qwen36-heretic
    restart: unless-stopped
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      # ▼ CRITICAL for DGX Spark / SM121 ▼
      # FlashInfer's CUTLASS NVFP4 path is broken on SM121 (only 101KB SMEM vs 228KB
      # on SM100 → autotuner fails with cudaFuncSetAttribute SMEM overflow on every
      # tile shape larger than 128×128×64B; dense FP4 GEMM produces NaN/zeros due to
      # E2M1 instruction incompatibility). Without this flag, vLLM intermittently
      # crashes with `cudaErrorIllegalAddress` mid-decode.
      # Reference: rmagur1203/vllm-dgx-spark TLDR.md (4-day investigation, 144 configs)
      - VLLM_TEST_FORCE_FP8_MARLIN=1
    volumes:
      - ${QWEN36_MODELS_DIR:-/opt/qwen36}/qwen36-nvfp4:/models/qwen36
      - ${QWEN36_MODELS_DIR:-/opt/qwen36}/qwen36-dflash:/models/qwen36-dflash
    command:
      - bash
      - -c
      - |
        exec vllm serve /models/qwen36 \
          --served-model-name qwen36-35b-heretic qwen36-fast qwen36-deep \
          --host 0.0.0.0 --port 8000 \
          --tensor-parallel-size 1 \
          --dtype auto \
          --quantization compressed-tensors \
          --max-model-len 262144 \
          --max-num-seqs 128 \
          --max-num-batched-tokens 16384 \
          --gpu-memory-utilization 0.85 \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --load-format safetensors \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser qwen3 \
          --speculative-config '{"method":"dflash","model":"/models/qwen36-dflash","num_speculative_tokens":15}' \
          --attention-backend flash_attn
          # 2026-04-19 RESOLVED: z-lab pushed an updated DFlash drafter that fixes the
          # long-context crash (>16K). Re-pull the drafter from HF if you cloned before
          # 2026-04-19 ~04:00 UTC:
          #   hf download z-lab/Qwen3.6-35B-A3B-DFlash --local-dir ./qwen36-dflash --force-download
          #
          # With the fresh drafter, --enforce-eager is no longer required. CUDA graphs are
          # safe and give ~42% throughput improvement (130 tok/s short single-stream vs
          # 91 tok/s eager). Capture-size alignment patch in v1.2 image still applies.
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
