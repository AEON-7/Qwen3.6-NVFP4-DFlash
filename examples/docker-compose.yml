# Qwen3.6-35B-A3B heretic NVFP4 + DFlash spec decode on DGX Spark
# Image: vllm-spark-omni:v1
#   - vLLM nightly (Qwen3.6 wiring fixes)
#   - flashinfer 0.6.8 (sm_120 NVFP4 KV decode kernels)
#   - DFlash proposer baked in
#   - Registry patch for Qwen3_5MoeForCausalLM (text-only)
#
# Target: AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4 (~21 GB)
# Drafter: z-lab/Qwen3.6-35B-A3B-DFlash (905 MB, custom_code)
#
# Expected: 4-5x speedup over no-spec on math/code, ~3x on agentic chat

services:
  vllm:
    image: vllm-spark-omni-q36:v1
    container_name: vllm-qwen36-heretic
    restart: unless-stopped
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
    volumes:
      - /home/albert/stacks/gemma4/qwen36-heretic-nvfp4-fixed:/models/qwen36
      - /home/albert/stacks/gemma4/qwen36-dflash:/models/qwen36-dflash
    command:
      - bash
      - -c
      - |
        exec vllm serve /models/qwen36 \
          --served-model-name qwen36-35b-heretic qwen36-fast qwen36-deep \
          --host 0.0.0.0 --port 8000 \
          --tensor-parallel-size 1 \
          --dtype auto \
          --quantization compressed-tensors \
          --max-model-len 262144 \
          --max-num-seqs 128 \
          --max-num-batched-tokens 8192 \
          --gpu-memory-utilization 0.85 \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --load-format safetensors \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser qwen3 \
          --speculative-config '{"method":"dflash","model":"/models/qwen36-dflash","num_speculative_tokens":15}' \
          --attention-backend flash_attn
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
