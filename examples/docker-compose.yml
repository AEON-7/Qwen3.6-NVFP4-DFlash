# Qwen3.6-35B-A3B heretic NVFP4 + DFlash spec decode on DGX Spark
#
# Image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1
#   - vLLM HEAD source-built for cu130/sm_120 (DGX Spark / GB10 / sm_121a)
#   - flashinfer 0.6.8 (sm_120 NVFP4 KV decode kernels)
#   - DFlash proposer baked in
#   - 7 patches (registry, RTLD_LAZY, mamba block_size, M-RoPE)
#
# Target: AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4 (~21 GB)
# Drafter: z-lab/Qwen3.6-35B-A3B-DFlash (~905 MB, gated — request access on HF)
#
# Expected: 91 tok/s single-stream greedy, 729 tok/s @64 concurrency (measured)
#
# ─── PATHS ─────────────────────────────────────────────────────────────────
# This compose expects the standard layout from docs/dgx-spark-setup.md:
#   /opt/qwen36/qwen36-nvfp4/    ← AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4
#   /opt/qwen36/qwen36-dflash/   ← z-lab/Qwen3.6-35B-A3B-DFlash
# Override with QWEN36_MODELS_DIR env var if your layout differs:
#   QWEN36_MODELS_DIR=/my/path docker compose up -d
# ───────────────────────────────────────────────────────────────────────────

services:
  vllm:
    image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1
    container_name: vllm-qwen36-heretic
    restart: unless-stopped
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
    volumes:
      - ${QWEN36_MODELS_DIR:-/opt/qwen36}/qwen36-nvfp4:/models/qwen36
      - ${QWEN36_MODELS_DIR:-/opt/qwen36}/qwen36-dflash:/models/qwen36-dflash
    command:
      - bash
      - -c
      - |
        exec vllm serve /models/qwen36 \
          --served-model-name qwen36-35b-heretic qwen36-fast qwen36-deep \
          --host 0.0.0.0 --port 8000 \
          --tensor-parallel-size 1 \
          --dtype auto \
          --quantization compressed-tensors \
          --max-model-len 262144 \
          --max-num-seqs 128 \
          --max-num-batched-tokens 8192 \
          --gpu-memory-utilization 0.85 \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --load-format safetensors \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser qwen3 \
          --speculative-config '{"method":"dflash","model":"/models/qwen36-dflash","num_speculative_tokens":15}' \
          --attention-backend flash_attn
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
