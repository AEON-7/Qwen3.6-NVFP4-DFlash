# Qwen3.6-35B-A3B-heretic NVFP4 + DFlash on DGX Spark
#
# Production config validated 2026-04-20.
#   - Image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1.2 (or :latest)
#   - Model: AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4 (v2 multimodal-preserved, ~22 GB)
#   - Drafter: z-lab/Qwen3.6-35B-A3B-DFlash (~905 MB; MUST be re-pulled if cloned before 2026-04-19)
#
# Measured performance (single-stream, greedy):
#   ~117 tok/s short prompts; ~785 tok/s aggregate at 128-concurrency.
#
# Default layout (override with QWEN36_MODELS_DIR=/your/path docker compose up -d):
#   /opt/qwen36/qwen36-nvfp4/    ← AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4
#   /opt/qwen36/qwen36-dflash/   ← z-lab/Qwen3.6-35B-A3B-DFlash

services:
  vllm:
    image: ghcr.io/aeon-7/vllm-spark-omni-q36:v1.2
    container_name: vllm-qwen36-heretic
    restart: unless-stopped
    network_mode: host
    environment:
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TORCH_MATMUL_PRECISION=high
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - NVIDIA_FORWARD_COMPAT=1
      # ▼ MANDATORY for DGX Spark / SM121 stability ▼
      # FlashInfer's CUTLASS NVFP4 path is broken on SM121 (only 101 KB SMEM per SM
      # vs 228 KB on SM100 → autotuner SMEM-overflows on every tile shape larger
      # than 128×128×64B; dense FP4 GEMM produces NaN/zeros from E2M1 instruction
      # incompatibility). Without this, vLLM crashes mid-decode with
      # cudaErrorIllegalAddress within minutes.
      # Reference: rmagur1203/vllm-dgx-spark TLDR.md (4-day, 144-config investigation).
      - VLLM_TEST_FORCE_FP8_MARLIN=1
    volumes:
      - ${QWEN36_MODELS_DIR:-/opt/qwen36}/qwen36-nvfp4:/models/qwen36
      - ${QWEN36_MODELS_DIR:-/opt/qwen36}/qwen36-dflash:/models/qwen36-dflash
    command:
      - bash
      - -c
      - |
        exec vllm serve /models/qwen36 \
          --served-model-name qwen36-35b-heretic qwen36-fast qwen36-deep \
          --host 0.0.0.0 --port 8000 \
          --tensor-parallel-size 1 \
          --dtype auto \
          --quantization compressed-tensors \
          --max-model-len 262144 \
          --max-num-seqs 128 \
          --max-num-batched-tokens 65536 \
          --gpu-memory-utilization 0.85 \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --load-format safetensors \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser qwen3 \
          --speculative-config '{"method":"dflash","model":"/models/qwen36-dflash","num_speculative_tokens":15}' \
          --attention-backend flash_attn
          # NOTE: --enforce-eager is NOT required when using v1.2 image + the latest z-lab
          # DFlash drafter (re-pulled 2026-04-19+). The image's compilation.py:1378 patch
          # (auto-aligns CUDA graph capture sizes to multiples of 1+spec_tokens) plus the
          # drafter's long-context fix means CUDA graphs are stable and give ~30% perf
          # over eager mode.
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
